<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:100%;height:100%}
body{display:flex;align-items:flex-start;justify-content:flex-start}
#r{display:inline-block}
img{image-rendering:pixelated;object-fit:contain;flex-shrink:0}

/* ═══ VARIABLES PARTAGÉES — modifier ici pour harmoniser tous les widgets ═══ */
:root{
  --sp:   48px;       /* taille sprite                    */
  --name: 11px;       /* taille police nom pokémon        */
  --cnt:  15px;       /* taille police compteur           */
  --sub:  10px;       /* taille sous-texte (timer, phase) */
  --pad:  10px 14px;  /* padding du conteneur             */
  --gap:  10px;       /* espace sprite ↔ texte            */
  --row:  7px;        /* espace entre deux lignes         */
  --br:   10px;       /* arrondi des coins                */
}
</style>
</head>
<body>
<div id="r">
  <div style="color:#f0c040;font-family:'Press Start 2P',monospace;font-size:9px;padding:12px">
    Connexion...
  </div>
</div>
<script>
// ── PARAMS ────────────────────────────────────────────
const P   = new URLSearchParams(location.search);
const TYPE = P.get('t') || 'chase';
const SB   = P.get('u') ? decodeURIComponent(P.get('u')) : '';
const SK   = P.get('k') ? decodeURIComponent(P.get('k')) : '';

if (!SB || !SK) {
  document.getElementById('r').innerHTML =
    '<div style="color:#f85149;font-family:monospace;font-size:11px;padding:10px">Clés Supabase manquantes</div>';
}

// ── HELPERS ───────────────────────────────────────────
function ft(ms) {
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return [h,m,sc].map(x=>String(x).padStart(2,'0')).join(':');
}
function rgba(hex, op) {
  try {
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${op/100})`;
  } catch(e) { return 'transparent'; }
}
function sUrl(slug, anim) {
  return anim
    ? `https://img.pokemondb.net/sprites/black-white/anim/shiny/${slug}.gif`
    : `https://img.pokemondb.net/sprites/black-white/normal/${slug}.png`;
}
// Sprite avec double-fallback anim→static→hidden
function sImg(slug, anim) {
  return `<img src="${sUrl(slug,anim)}" style="width:var(--sp);height:var(--sp)"
    onerror="if(this.src.includes('anim')){this.src='${sUrl(slug,false)}';this.onerror=function(){this.style.display='none'}}else{this.style.display='none'}">`;
}
// Fond du conteneur (couleur + bordure)
function bg(cfg) {
  return `background:${rgba(cfg.bg,cfg.op)};border:2px solid ${cfg.tx};border-radius:var(--br);padding:var(--pad);`;
}
// Séparateur entre lignes (sauf la dernière)
function sep(isLast) {
  return isLast ? '' : 'border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:var(--row);margin-bottom:var(--row);';
}

// ── SUPABASE POLLING ──────────────────────────────────
let STATE = null, lastTs = 0;

async function fetchState() {
  if (!SB || !SK) return;
  try {
    const res = await fetch(`${SB}/rest/v1/state?id=eq.main&select=data,updated_at`, {
      headers: { 'apikey': SK, 'Authorization': 'Bearer ' + SK, 'Content-Type': 'application/json' }
    });
    if (!res.ok) return;
    const rows = await res.json();
    if (!rows || !rows[0]) return;
    const ts = new Date(rows[0].updated_at).getTime();
    if (ts !== lastTs) { lastTs = ts; STATE = rows[0].data; render(); }
  } catch(e) {}
}

function render() {
  if (!STATE) return;
  if      (TYPE === 'chase') renderChase();
  else if (TYPE === 'list')  renderList();
  else if (TYPE === 'hist')  renderHist();
}

// ════════════════════════════════════════════════════════
// WIDGET CHASSE ACTIVE
// ════════════════════════════════════════════════════════
function renderChase() {
  const S   = STATE;
  const h   = S.hunts && S.hunts.find(x => x.id === S.activeId && !x.found);
  const cfg = Object.assign(
    { ly:'v', m:['name','count','time'], o:['shd','bg','anim'], bg:'#0d1117', tx:'#f0c040', su:'#8b949e', op:90 },
    S.wc || {}
  );
  const anim    = cfg.o.includes('anim');
  const hasBg   = cfg.o.includes('bg');
  const hasSh   = cfg.o.includes('shd');
  const hideSp  = cfg.o.includes('hsp');
  const show    = k => cfg.m.includes(k);
  const slug    = h ? h.slug : '';
  const now     = Date.now();
  const sess    = h ? ((h.elapsed||0) + (h.startTime && !S.paused ? now - h.startTime : 0)) : 0;
  const tot     = (S.totalElapsed||0) + (!S.paused && S.globalStart ? now - S.globalStart : 0);
  const prob    = h ? ((1 - Math.pow(1 - 1/h.odds, h.count)) * 100).toFixed(1) + '%' : '0%';
  const isH     = cfg.ly === 'h' || cfg.ly === 'hf';
  const fd      = cfg.ly === 'hf' ? 'row-reverse' : isH ? 'row' : 'column';
  const shad    = hasSh ? `text-shadow:0 0 14px ${cfg.tx}80;` : '';
  const bgSt    = hasBg ? bg(cfg) : 'background:transparent;border:none;';

  let sp = '', info = '';

  // Sprite
  if (!hideSp && cfg.ly !== 'ct' && slug) {
    sp = sImg(slug, anim);
  }

  // Bloc texte
  if (cfg.ly !== 'sp') {
    const align = isH ? '' : 'align-items:center;';
    info = `<div style="display:flex;flex-direction:column;gap:4px;${align}">`;
    if (show('name'))
      info += `<div style="font-family:'Press Start 2P',monospace;font-size:var(--name);color:${cfg.tx};margin-bottom:2px">${h ? h.name.toUpperCase() : 'EN CHASSE'}</div>`;
    if (show('count') && cfg.ly !== 'time')
      info += `<div style="font-family:'Press Start 2P',monospace;font-size:var(--cnt);color:${cfg.tx};${shad}">${h ? h.count.toLocaleString() : '0'}</div>`;
    if (show('time'))
      info += `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">⏱ ${ft(sess)}</div>`;
    if (show('tot'))
      info += `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">⏱ Tot. ${ft(tot)}</div>`;
    if (show('phase'))
      info += `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">Phase ${h ? h.phase : 1}</div>`;
    if (show('prob'))
      info += `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">Proba: ${prob}</div>`;
    info += `</div>`;
  }

  document.getElementById('r').innerHTML =
    `<div style="display:inline-flex;flex-direction:${fd};align-items:center;gap:var(--gap);${bgSt}">
      ${sp}${info}
    </div>`;
}

// ════════════════════════════════════════════════════════
// WIDGET LISTE DES HUNTS
// ════════════════════════════════════════════════════════
function renderList() {
  const S   = STATE;
  const cfg = Object.assign(
    { m:['name','count','sp','anim'], bg:'#0d1117', tx:'#f0c040', su:'#8b949e', op:90 },
    S.wl || {}
  );
  const active = (S.hunts || []).filter(h => !h.found);
  const sA  = cfg.m.includes('anim');
  const sSp = cfg.m.includes('sp');
  const sN  = cfg.m.includes('name');
  const sC  = cfg.m.includes('count');
  const sPh = cfg.m.includes('phase');
  const sT  = cfg.m.includes('time');
  const sTT = cfg.m.includes('tot');
  const tot = (S.totalElapsed||0) + (!S.paused && S.globalStart ? Date.now() - S.globalStart : 0);

  if (!active.length) {
    document.getElementById('r').innerHTML =
      `<div style="${bg(cfg)}"><div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">Aucune chasse active</div></div>`;
    return;
  }

  const rows = active.map((h, i) => {
    const hs  = (h.elapsed||0) + (h.startTime && !S.paused ? Date.now() - h.startTime : 0);
    const isA = h.id === S.activeId;
    const isLast = i === active.length - 1;

    return `<div style="${rowStyle(isLast)}">
      ${sSp ? sImg(h.slug, sA) : ''}
      <div style="flex:1;min-width:0">
        ${sN  ? `<div style="font-size:var(--name);font-weight:700;color:${isA ? cfg.tx : '#aaa'};font-family:'DM Sans',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px">${isA ? '● ' : ''}${h.name}</div>` : ''}
        ${sPh ? `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">Phase ${h.phase}</div>` : ''}
        ${sT  ? `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">⏱ ${ft(hs)}</div>` : ''}
        ${sTT ? `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">⏱ Tot. ${ft(tot)}</div>` : ''}
      </div>
      ${sC ? `<div style="font-family:'Press Start 2P',monospace;font-size:var(--cnt);color:${cfg.tx};white-space:nowrap;margin-left:auto">${h.count.toLocaleString()}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('r').innerHTML =
    `<div style="${bg(cfg)}width:fit-content;min-width:180px">${rows}</div>`;
}

// ════════════════════════════════════════════════════════
// WIDGET HISTORIQUE SHINIES
// ════════════════════════════════════════════════════════
function renderHist() {
  const S      = STATE;
  const cfg    = Object.assign(
    { ly:'list', m:['name','count','sp','anim'], nb:3, bg:'#0d1117', tx:'#f0c040', su:'#8b949e', op:90 },
    S.wh || {}
  );
  const hidden = S.hidden || [];
  const items  = (S.history || []).filter(h => !hidden.includes(h.id)).slice(0, cfg.nb || 3);
  const sA  = cfg.m.includes('anim');
  const sSp = cfg.m.includes('sp');
  const sN  = cfg.m.includes('name');
  const sC  = cfg.m.includes('count');
  const sD  = cfg.m.includes('date');
  const sT  = cfg.m.includes('time');
  const sPh = cfg.m.includes('phase');
  const ly  = cfg.ly || 'list';

  if (!items.length) {
    document.getElementById('r').innerHTML =
      `<div style="${bg(cfg)}"><div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">Aucun shiny encore...</div></div>`;
    return;
  }

  // ── Dernier seul ──────────────────────────────────────
  if (ly === 'last1') {
    const h = items[0];
    document.getElementById('r').innerHTML =
      `<div style="${bg(cfg)}display:inline-flex;flex-direction:column;align-items:center;text-align:center;gap:var(--row)">
        ${sSp ? sImg(h.slug, sA) : ''}
        ${sN  ? `<div style="font-family:'Press Start 2P',monospace;font-size:var(--name);color:${cfg.tx};margin-bottom:2px">✦ ${h.name}</div>` : ''}
        ${sC  ? `<div style="font-family:'Press Start 2P',monospace;font-size:var(--cnt);color:${cfg.tx}">${h.count.toLocaleString()}</div>` : ''}
        ${sD  ? `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">${h.date}</div>` : ''}
      </div>`;
    return;
  }

  // ── Cartes ────────────────────────────────────────────
  if (ly === 'cards') {
    const cards = items.map(h => {
      const mins = Math.floor((h.elapsed||0) / 60000);
      const ts   = mins > 60 ? `${Math.floor(mins/60)}h ${mins%60}m` : `${mins}m`;
      return `<div style="display:flex;flex-direction:column;align-items:center;text-align:center;background:rgba(255,255,255,.06);border-radius:8px;padding:var(--gap);gap:4px;min-width:calc(var(--sp) + 16px)">
        ${sSp ? sImg(h.slug, sA) : ''}
        ${sN  ? `<div style="font-size:var(--name);font-weight:700;color:${cfg.tx};font-family:'DM Sans',sans-serif;margin-top:2px">✦ ${h.name}</div>` : ''}
        ${sC  ? `<div style="font-family:'Press Start 2P',monospace;font-size:var(--cnt);color:${cfg.tx}">${h.count.toLocaleString()}</div>` : ''}
        ${sD  ? `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">${h.date}</div>` : ''}
        ${sT  ? `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">⏱ ${ts}</div>` : ''}
      </div>`;
    }).join('');
    document.getElementById('r').innerHTML =
      `<div style="${bg(cfg)}display:flex;flex-direction:row;flex-wrap:wrap;gap:var(--gap)">${cards}</div>`;
    return;
  }

  // ── Liste (défaut) ou Horizontal ─────────────────────
  const isH  = ly === 'horiz';
  const rows = items.map((h, i) => {
    const mins   = Math.floor((h.elapsed||0) / 60000);
    const ts     = mins > 60 ? `${Math.floor(mins/60)}h ${mins%60}m` : `${mins}m`;
    const isLast = i === items.length - 1;
    return `<div style="${rowStyle(isH ? true : isLast)}">
      ${sSp ? sImg(h.slug, sA) : ''}
      <div style="flex:1;min-width:0">
        ${sN  ? `<div style="font-size:var(--name);font-weight:700;color:${cfg.tx};font-family:'DM Sans',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px">✦ ${h.name}</div>` : ''}
        ${sD  ? `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">${h.date}${sPh ? ' · Ph.' + h.phase : ''}</div>` : ''}
        ${sT  ? `<div style="font-size:var(--sub);color:${cfg.su};font-family:'DM Sans',sans-serif">⏱ ${ts}</div>` : ''}
      </div>
      ${sC ? `<div style="font-family:'Press Start 2P',monospace;font-size:var(--cnt);color:${cfg.tx};white-space:nowrap;margin-left:auto">${h.count.toLocaleString()}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('r').innerHTML =
    `<div style="${bg(cfg)}display:flex;flex-direction:${isH ? 'row' : 'column'};gap:${isH ? 'var(--gap)' : '0'}">${rows}</div>`;
}

// ── Ligne commune ─────────────────────────────────────
function rowStyle(isLast) {
  return `display:flex;align-items:center;gap:var(--gap);${!isLast ? 'border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:var(--row);margin-bottom:var(--row);' : ''}`;
}

// ── bg helper ─────────────────────────────────────────
function bg(cfg) {
  return `background:${rgba(cfg.bg, cfg.op)};border:2px solid ${cfg.tx};border-radius:var(--br);padding:var(--pad);`;
}

// ── START ─────────────────────────────────────────────
if (SB && SK) {
  fetchState();
  setInterval(fetchState, 2000);
  setInterval(() => { if (STATE) render(); }, 1000);
}
</script>
</body>
</html>
