<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Reset total — fond transparent pour OBS */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: transparent !important;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
body {
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
}
#root {
  display: inline-block;
  width: 100%;
}

/* Variables CSS responsive — basées sur la taille de la fenêtre OBS */
/* Par défaut pour une fenêtre 400x160px */
:root {
  --sprite-size: clamp(40px, 10vw, 80px);
  --sprite-sm: clamp(28px, 7vw, 56px);
  --sprite-lg: clamp(56px, 14vw, 100px);
  --name-size: clamp(7px, 1.8vw, 13px);
  --count-size: clamp(14px, 4vw, 28px);
  --count-sm: clamp(9px, 2.2vw, 16px);
  --sub-size: clamp(9px, 2vw, 14px);
  --gap: clamp(8px, 2vw, 18px);
  --padding: clamp(8px, 2vw, 18px);
  --row-gap: clamp(5px, 1.2vw, 10px);
}

img { image-rendering: pixelated; }
</style>
</head>
<body>
<div id="root">
  <div style="color:#f0c040;font-family:'Press Start 2P',monospace;font-size:10px;padding:16px;text-align:center;">
    Connexion...
  </div>
</div>
<script src="widget.js"></script>
</body>
</html>
