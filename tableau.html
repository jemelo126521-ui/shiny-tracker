<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;font-family:'DM Sans',sans-serif;font-size:13px;color:#e6edf3}
img{image-rendering:pixelated;object-fit:contain;flex-shrink:0}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#8b949e;font-weight:600;text-align:left;padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.1);text-transform:uppercase;letter-spacing:.5px}
td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.06)}
tr:last-child td{border-bottom:none}
.px{font-family:'Press Start 2P',monospace}
.kpi{display:flex;gap:8px;margin-bottom:12px}
.kcard{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px;text-align:center}
.kn{font-family:'Press Start 2P',monospace;font-size:13px;color:#f0c040}
.kl{font-size:10px;color:#8b949e;margin-top:4px}
.sec{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px;margin-bottom:10px}
.st{font-family:'Press Start 2P',monospace;font-size:7px;color:#f0c040;letter-spacing:1px;margin-bottom:8px}
</style>
</head>
<body style="padding:10px">
<div id="r"><div style="color:#f0c040;font-family:'Press Start 2P',monospace;font-size:9px;padding:12px">Connexion...</div></div>
<script>
const P=new URLSearchParams(location.search);
const SB=P.get('u')?decodeURIComponent(P.get('u')):'';
const SK=P.get('k')?decodeURIComponent(P.get('k')):'';
if(!SB||!SK){document.getElementById('r').innerHTML='<div style="color:#f85149;font-size:11px;padding:10px">Clés Supabase manquantes</div>';}

function ft(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return[h,m,sc].map(x=>String(x).padStart(2,'0')).join(':');}
function sUrl(slug){return`https://img.pokemondb.net/sprites/black-white/normal/${slug}.png`;}
function sImg(slug){return`<img src="${sUrl(slug)}" style="width:24px;height:24px" onerror="this.style.display='none'">`;}

let STATE=null,lastTs=0;
async function fetchState(){
  if(!SB||!SK)return;
  try{
    const res=await fetch(`${SB}/rest/v1/state?id=eq.main&select=data,updated_at`,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
    if(!res.ok)return;
    const rows=await res.json();
    if(!rows||!rows[0])return;
    const ts=new Date(rows[0].updated_at).getTime();
    if(ts!==lastTs){lastTs=ts;STATE=rows[0].data;render();}
  }catch(e){}
}

function render(){
  if(!STATE)return;
  const S=STATE;
  const hist=S.history||[];
  const active=(S.hunts||[]).filter(h=>!h.found);
  const now=Date.now();
  const totalEnc=hist.reduce((a,h)=>a+h.count,0)+active.reduce((a,h)=>a+h.count,0);
  const avg=hist.length?Math.round(hist.reduce((a,h)=>a+h.count,0)/hist.length):0;
  const tot=(S.totalElapsed||0)+(!S.paused&&S.globalStart?now-S.globalStart:0);

  let html=`<div class="kpi">
    <div class="kcard"><div class="kn">${hist.length}</div><div class="kl">✦ Shinies</div></div>
    <div class="kcard"><div class="kn">${totalEnc.toLocaleString()}</div><div class="kl">Rencontres</div></div>
    <div class="kcard"><div class="kn">${avg?avg.toLocaleString():'—'}</div><div class="kl">Moyenne</div></div>
    <div class="kcard"><div class="kn" style="font-size:10px">${ft(tot)}</div><div class="kl">Temps total</div></div>
  </div>`;

  // Chasses actives
  html+=`<div class="sec"><div class="st">CHASSES EN COURS</div>`;
  if(!active.length){html+='<div style="color:#6e7681;font-size:12px">Aucune chasse active</div>';}
  else{
    html+=`<table><thead><tr><th></th><th>Pokémon</th><th>Enc.</th><th>Phase</th><th>Proba</th><th>Temps</th><th>Zone</th></tr></thead><tbody>`;
    active.forEach(h=>{
      const sess=(h.elapsed||0)+(h.startTime&&!S.paused?now-h.startTime:0);
      const prob=((1-Math.pow(1-1/h.odds,h.count))*100).toFixed(1)+'%';
      const isA=h.id===S.activeId;
      const probF=parseFloat(prob);
      html+=`<tr style="${isA?'background:rgba(88,166,255,.06)':''}">
        <td>${sImg(h.slug)}</td>
        <td style="font-weight:600;color:${isA?'#58a6ff':'#e6edf3'}">${isA?'● ':''}${h.name}</td>
        <td class="px" style="font-size:11px;color:#f0c040">${h.count.toLocaleString()}</td>
        <td style="color:#8b949e">${h.phase}</td>
        <td style="font-weight:700;color:${probF>75?'#f85149':probF>50?'#f0c040':'#3fb950'}">${prob}</td>
        <td style="color:#8b949e;font-size:11px">${ft(sess)}</td>
        <td style="color:#8b949e">${h.zone||'—'}</td>
      </tr>`;
    });
    html+=`</tbody></table>`;
  }
  html+=`</div>`;

  // Historique shinies
  html+=`<div class="sec"><div class="st">SHINIES CAPTURÉS</div>`;
  if(!hist.length){html+='<div style="color:#6e7681;font-size:12px">Aucun shiny encore 🍀</div>';}
  else{
    html+=`<table><thead><tr><th></th><th>Pokémon</th><th>Enc.</th><th>Chance</th><th>Durée</th><th>Date</th></tr></thead><tbody>`;
    hist.forEach(h=>{
      const luck=Math.round((h.odds||30000)/h.count*100);
      const mins=Math.floor((h.elapsed||0)/60000);
      const ts=mins>60?`${Math.floor(mins/60)}h ${mins%60}m`:`${mins}m`;
      html+=`<tr>
        <td>${sImg(h.slug)}</td>
        <td style="font-weight:600">✦ ${h.name}</td>
        <td class="px" style="font-size:11px;color:#f0c040">${h.count.toLocaleString()}</td>
        <td style="font-weight:700;color:${luck>=100?'#3fb950':'#f85149'}">${luck}%</td>
        <td style="color:#8b949e">${ts}</td>
        <td style="color:#8b949e">${h.date}</td>
      </tr>`;
    });
    html+=`</tbody></table>`;
  }
  html+=`</div>`;

  document.getElementById('r').innerHTML=html;
}

if(SB&&SK){fetchState();setInterval(fetchState,3000);setInterval(()=>{if(STATE)render();},1000);}
</script>
</body>
</html>
